<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英語1200字 · 單字學習</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f14;
    --surface: #1a1a24;
    --surface2: #22222f;
    --border: #2e2e40;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --accent-dim: #3d3580;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --text: #e8e8f0;
    --text2: #9898b0;
    --text3: #5a5a70;
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  #nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(15,15,20,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 58px;
  }
  #nav .logo {
    font-family: 'Outfit', sans-serif;
    font-weight: 800; font-size: 18px;
    background: linear-gradient(135deg, var(--accent2), #c4b5fd);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  #nav .nav-tabs { display: flex; gap: 4px; }
  .nav-btn {
    background: none; border: none; color: var(--text2);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px; padding: 6px 14px; border-radius: 99px;
    cursor: pointer; transition: all .2s;
  }
  .nav-btn:hover { color: var(--text); background: var(--surface); }
  .nav-btn.active { color: var(--accent2); background: var(--accent-dim); }

  /* ── PAGES ── */
  .page { display: none; padding: 78px 24px 40px; max-width: 760px; margin: 0 auto; }
  .page.active { display: block; }

  /* ── HOME ── */
  .home-header {
    text-align: center; padding: 32px 0 28px;
  }
  .home-header h1 {
    font-family: 'Outfit', sans-serif;
    font-size: clamp(28px, 6vw, 48px); font-weight: 800;
    background: linear-gradient(135deg, #c4b5fd 0%, var(--accent2) 50%, #818cf8 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    line-height: 1.1; margin-bottom: 10px;
  }
  .home-header p { color: var(--text2); font-size: 14px; }

  .stat-row {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px 14px; text-align: center;
  }
  .stat-card .val {
    font-family: 'Outfit', sans-serif; font-size: 28px; font-weight: 800;
    color: var(--accent2);
  }
  .stat-card .lbl { font-size: 12px; color: var(--text2); margin-top: 4px; }

  .section-title {
    font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 700;
    color: var(--text2); text-transform: uppercase; letter-spacing: .08em;
    margin-bottom: 12px; margin-top: 24px;
  }

  /* daily goal */
  .goal-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
  }
  .goal-row { display: flex; align-items: center; gap: 12px; }
  .goal-label { font-size: 14px; color: var(--text2); white-space: nowrap; }
  .goal-input {
    width: 90px; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: 'Outfit', sans-serif; font-size: 20px; font-weight: 700;
    text-align: center; padding: 8px; outline: none;
  }
  .goal-input:focus { border-color: var(--accent); }
  .goal-slider {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 4px; border-radius: 99px;
    background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--pct, 5%), var(--border) var(--pct, 5%));
    outline: none;
  }
  .goal-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px;
    border-radius: 50%; background: var(--accent2);
    cursor: pointer; border: 2px solid var(--bg);
  }

  /* start buttons */
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
  .btn-big {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px 14px;
    color: var(--text); cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif; font-size: 14px;
    transition: all .2s; text-align: left;
  }
  .btn-big:hover { border-color: var(--accent); background: var(--accent-dim); }
  .btn-big .icon { font-size: 24px; margin-bottom: 8px; display: block; }
  .btn-big .btitle { font-weight: 700; font-size: 15px; margin-bottom: 2px; }
  .btn-big .bsub { font-size: 12px; color: var(--text2); }

  .btn-primary {
    display: block; width: 100%;
    background: linear-gradient(135deg, var(--accent), #818cf8);
    border: none; border-radius: var(--radius); padding: 16px;
    color: #fff; font-family: 'Outfit', sans-serif;
    font-size: 16px; font-weight: 700; cursor: pointer;
    transition: opacity .2s; margin-top: 12px;
  }
  .btn-primary:hover { opacity: .85; }

  /* progress bar */
  .prog-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-top: 12px; }
  .prog-bar-track { background: var(--border); border-radius: 99px; height: 8px; overflow: hidden; margin: 8px 0 6px; }
  .prog-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(to right, var(--accent), var(--accent2)); transition: width .5s; }
  .prog-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); }

  /* ── QUIZ ── */
  .quiz-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .quiz-mode-toggle { display: flex; gap: 4px; }
  .mode-btn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 6px 14px;
    color: var(--text2); font-size: 13px; cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: all .15s;
  }
  .mode-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent2); }

  .quiz-counter { font-size: 13px; color: var(--text2); }
  .quiz-counter span { color: var(--accent2); font-weight: 700; font-family: 'Outfit', sans-serif; }

  .quiz-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 36px 28px;
    text-align: center; margin-bottom: 20px;
    position: relative; overflow: hidden;
  }
  .quiz-card::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(124,106,247,.08), transparent 70%);
    pointer-events: none;
  }
  .quiz-prompt-label {
    font-size: 11px; color: var(--text3); letter-spacing: .1em;
    text-transform: uppercase; margin-bottom: 12px;
  }
  .quiz-prompt {
    font-family: 'Outfit', sans-serif; font-size: clamp(28px, 6vw, 44px);
    font-weight: 800; color: var(--text);
    line-height: 1.1; margin-bottom: 8px;
  }
  .quiz-prompt.chinese {
    font-family: 'Noto Sans TC', sans-serif; font-size: clamp(20px, 4vw, 30px);
    font-weight: 700;
  }
  .quiz-meanings-display {
    font-size: 13px; color: var(--text2); margin-top: 6px;
    min-height: 18px;
  }
  .speak-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 99px; padding: 6px 14px;
    color: var(--text2); font-size: 13px; cursor: pointer;
    margin-top: 16px; transition: all .2s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .speak-btn:hover { border-color: var(--accent); color: var(--accent2); }

  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .choice-btn {
    background: var(--surface2); border: 2px solid var(--border);
    border-radius: var(--radius); padding: 16px 12px;
    color: var(--text); font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px; cursor: pointer; text-align: left;
    transition: all .15s; line-height: 1.4;
  }
  .choice-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-dim); }
  .choice-btn.correct { border-color: var(--green); background: rgba(52,211,153,.12); color: var(--green); }
  .choice-btn.wrong { border-color: var(--red); background: rgba(248,113,113,.12); color: var(--red); }
  .choice-btn:disabled { cursor: default; }

  .quiz-result {
    text-align: center; padding: 20px 0;
    display: none;
  }
  .result-emoji { font-size: 48px; margin-bottom: 8px; }
  .result-msg { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .result-sub { font-size: 13px; color: var(--text2); }

  .next-btn {
    display: none; width: 100%;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px;
    color: var(--text); font-family: 'Outfit', sans-serif;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: all .2s; margin-top: 10px;
  }
  .next-btn:hover { background: var(--accent-dim); border-color: var(--accent); }

  /* session end */
  .session-end {
    display: none; text-align: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 40px 24px;
  }
  .session-end h2 { font-family: 'Outfit', sans-serif; font-size: 28px; font-weight: 800; margin-bottom: 8px; }
  .session-end p { color: var(--text2); font-size: 14px; margin-bottom: 20px; }
  .score-display {
    font-family: 'Outfit', sans-serif; font-size: 56px; font-weight: 800;
    background: linear-gradient(135deg, var(--green), #6ee7b7);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }
  .score-label { font-size: 13px; color: var(--text2); margin-bottom: 24px; }

  /* ── REVIEW ── */
  .review-empty {
    text-align: center; padding: 60px 20px;
    color: var(--text2); font-size: 14px;
  }
  .review-empty .icon { font-size: 40px; margin-bottom: 12px; }

  .review-batch-list { display: flex; flex-direction: column; gap: 10px; }
  .review-batch {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; transition: all .2s;
  }
  .review-batch:hover { border-color: var(--accent); }
  .rb-info .rb-title { font-weight: 700; font-size: 15px; }
  .rb-info .rb-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .rb-arrow { color: var(--text3); font-size: 18px; }

  /* review detail / flashcard */
  .review-detail { display: none; }
  .back-btn {
    background: none; border: none; color: var(--text2);
    font-size: 13px; cursor: pointer; padding: 0; margin-bottom: 20px;
    display: flex; align-items: center; gap: 6px;
    font-family: 'Noto Sans TC', sans-serif; transition: color .2s;
  }
  .back-btn:hover { color: var(--text); }

  .flashcard-wrap { perspective: 1000px; margin-bottom: 20px; }
  .flashcard {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 40px 28px;
    text-align: center; min-height: 180px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    cursor: pointer;
    transition: transform .15s;
  }
  .flashcard:active { transform: scale(.98); }
  .flashcard::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(124,106,247,.06), transparent 70%);
    pointer-events: none;
  }
  .fc-word {
    font-family: 'Outfit', sans-serif; font-size: clamp(30px,7vw,50px); font-weight: 800;
    color: var(--text); margin-bottom: 12px;
  }
  .fc-meanings {
    font-size: 15px; color: var(--accent2); line-height: 1.6;
    max-width: 400px;
  }
  .fc-hint { font-size: 12px; color: var(--text3); margin-top: 16px; }
  .fc-nav { display: flex; gap: 10px; align-items: center; justify-content: center; }
  .fc-nav-btn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 99px; padding: 10px 20px;
    color: var(--text); font-family: 'Outfit', sans-serif;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s;
  }
  .fc-nav-btn:hover { border-color: var(--accent); color: var(--accent2); }
  .fc-count { font-size: 13px; color: var(--text2); font-family: 'Outfit', sans-serif; }

  .review-mode-bar {
    display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .rev-mode-btn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 7px 14px;
    font-size: 13px; color: var(--text2); cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif; transition: all .15s;
  }
  .rev-mode-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent2); }

  /* toast */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(40px);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 99px; padding: 10px 20px;
    font-size: 14px; color: var(--text);
    opacity: 0; transition: all .3s; pointer-events: none; z-index: 999;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── WORD GRID ── */
  #word-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 8px;
    margin-bottom: 24px;
  }
  .word-chip {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 12px;
    cursor: pointer; transition: all .15s;
    text-align: left;
  }
  .word-chip:hover { border-color: var(--accent); background: var(--accent-dim); }
  .word-chip .wc-en {
    font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 700;
    color: var(--text); margin-bottom: 3px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .word-chip .wc-zh {
    font-size: 11px; color: var(--text2); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
</style>
</head>
<body>

<nav id="nav">
  <div class="logo">英語1200</div>
  <div class="nav-tabs">
    <button class="nav-btn active" onclick="showPage('home')">首頁</button>
    <button class="nav-btn" onclick="showPage('quiz')">學習</button>
    <button class="nav-btn" onclick="showPage('review')">複習</button>
  </div>
</nav>

<!-- HOME PAGE -->
<div id="page-home" class="page active">
  <div class="home-header">
    <h1>教育部 1200 單字</h1>
    <p>國中小基本英語字彙 · 完整版</p>
  </div>

  <div class="stat-row">
    <div class="stat-card"><div class="val" id="stat-total">1200</div><div class="lbl">總詞彙</div></div>
    <div class="stat-card"><div class="val" id="stat-learned">0</div><div class="lbl">已學習</div></div>
    <div class="stat-card"><div class="val" id="stat-streak">0</div><div class="lbl">連續天數</div></div>
  </div>

  <div class="prog-wrap">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:14px;font-weight:700">學習進度</span>
      <span style="font-size:13px;color:var(--text2)" id="prog-text">0 / 1200</span>
    </div>
    <div class="prog-bar-track"><div class="prog-bar-fill" id="prog-bar" style="width:0%"></div></div>
    <div class="prog-meta"><span id="prog-pct">0%</span><span id="prog-remain">剩餘 1200 字</span></div>
  </div>

  <div class="section-title">每日目標</div>
  <div class="goal-card">
    <div class="goal-row">
      <span class="goal-label">每天背</span>
      <input type="number" class="goal-input" id="goal-input" min="1" max="1000" value="20">
      <input type="range" class="goal-slider" id="goal-slider" min="1" max="1000" value="20">
      <span class="goal-label">個</span>
    </div>
  </div>

  <div class="section-title">開始學習</div>
  <div class="btn-row">
    <button class="btn-big" onclick="startSession('word2meaning')">
      <span class="icon">🔤</span>
      <div class="btitle">看詞選義</div>
      <div class="bsub">看英文，選中文意思</div>
    </button>
    <button class="btn-big" onclick="startSession('meaning2word')">
      <span class="icon">💬</span>
      <div class="btitle">看義選詞</div>
      <div class="bsub">看中文，選英文單字</div>
    </button>
  </div>
  <button class="btn-primary" onclick="startSession('both')">🎲 混合模式（隨機）</button>
</div>

<!-- QUIZ PAGE -->
<div id="page-quiz" class="page">
  <div id="quiz-active">
    <div class="quiz-header">
      <div class="quiz-mode-toggle">
        <button class="mode-btn active" id="qmode-w2m" onclick="switchMode('word2meaning')">看詞選義</button>
        <button class="mode-btn" id="qmode-m2w" onclick="switchMode('meaning2word')">看義選詞</button>
      </div>
      <div class="quiz-counter"><span id="qcur">1</span> / <span id="qtotal">20</span></div>
    </div>
    <div class="quiz-card">
      <div class="quiz-prompt-label" id="qprompt-label">英文單字</div>
      <div class="quiz-prompt" id="qprompt">apple</div>
      <div class="quiz-meanings-display" id="qmeanings-display"></div>
      <button class="speak-btn" id="speak-btn" onclick="speakWord()">🔊 發音</button>
    </div>
    <div class="choices" id="choices"></div>
    <div class="quiz-result" id="quiz-result">
      <div class="result-emoji" id="result-emoji">✅</div>
      <div class="result-msg" id="result-msg">答對了！</div>
      <div class="result-sub" id="result-sub"></div>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">下一題 →</button>
  </div>

  <div class="session-end" id="session-end">
    <div class="result-emoji" style="font-size:48px;margin-bottom:12px">🎉</div>
    <h2>今日完成！</h2>
    <div class="score-display" id="end-score">0/0</div>
    <div class="score-label">答對題數</div>
    <p id="end-msg">這批單字已加入複習庫</p>
    <button class="btn-primary" onclick="showPage('home')">回首頁</button>
    <button class="btn-primary" style="margin-top:8px;background:var(--surface2);border:1px solid var(--border);color:var(--text)" onclick="showPage('review')">查看複習庫</button>
  </div>
</div>

<!-- REVIEW PAGE -->
<div id="page-review" class="page">

  <!-- VIEW 1: batch list -->
  <div id="review-list-view">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h2 style="font-family:'Outfit',sans-serif;font-size:22px;font-weight:800">複習庫</h2>
      <span style="font-size:12px;color:var(--text2)" id="review-count-label">0 批</span>
    </div>
    <div id="review-batches"></div>
  </div>

  <!-- VIEW 2: word list (overview) -->
  <div id="review-words-view" style="display:none">
    <button class="back-btn" onclick="backToReviewList()">← 返回複習庫</button>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-family:'Outfit',sans-serif;font-size:18px;font-weight:800" id="rwv-title">單字一覽</div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px" id="rwv-sub"></div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="rev-mode-btn active" id="rvm-list" onclick="setReviewMode('list')">📋 一覽</button>
        <button class="rev-mode-btn" id="rvm-flash" onclick="setReviewMode('flash')">📖 字卡</button>
        <button class="rev-mode-btn" id="rvm-w2m" onclick="setReviewMode('word2meaning')">🔤 看詞選義</button>
        <button class="rev-mode-btn" id="rvm-m2w" onclick="setReviewMode('meaning2word')">💬 看義選詞</button>
      </div>
    </div>

    <!-- list mode -->
    <div id="rev-list-mode">
      <div id="word-grid"></div>
    </div>

    <!-- flashcard mode -->
    <div id="flash-mode" style="display:none">
      <div class="flashcard-wrap">
        <div class="flashcard" id="flashcard" onclick="toggleFlashcard()">

const VOCAB = RAW.map(([id, word, meaning]) => ({ id, word, meaning }));

// ─── STATE ─────────────────────────────────────────────────────────
let state = {
  goal: 20,
  cursor: 0,           // next word index to learn (0~1199, wraps around)
  batches: [],
  streak: 0,
  lastDate: null,
};

function saveState() {
  const s = {
    goal: state.goal,
    cursor: state.cursor,
    batches: state.batches,
    streak: state.streak,
    lastDate: state.lastDate,
  };
  try { localStorage.setItem('vocab1200_state', JSON.stringify(s)); } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem('vocab1200_state');
    if (!raw) return;
    const s = JSON.parse(raw);
    state.goal = s.goal || 20;
    // support old format that had learnedIndices
    if (s.cursor !== undefined) {
      state.cursor = s.cursor;
    } else if (s.learnedIndices) {
      state.cursor = s.learnedIndices.length % VOCAB.length;
    }
    state.batches = s.batches || [];
    state.streak = s.streak || 0;
    state.lastDate = s.lastDate || null;
  } catch(e) {}
}

loadState();

// ─── SESSION ───────────────────────────────────────────────────────
let session = {
  mode: 'word2meaning',
  words: [],
  idx: 0,
  score: 0,
  answered: false,
  currentWord: null,
};

function getNextWords(count) {
  const result = [];
  for (let i = 0; i < count; i++) {
    result.push((state.cursor + i) % VOCAB.length);
  }
  return result;
}

function startSession(mode) {
  const count = state.goal;
  const wordIndices = getNextWords(count);
  session.mode = mode === 'both' ? (Math.random() > .5 ? 'word2meaning' : 'meaning2word') : mode;
  session.words = wordIndices;
  session.idx = 0;
  session.score = 0;
  session.answered = false;

  document.getElementById('session-end').style.display = 'none';
  document.getElementById('quiz-active').style.display = 'block';
  document.getElementById('qtotal').textContent = wordIndices.length;

  // set mode buttons
  document.getElementById('qmode-w2m').classList.toggle('active', session.mode !== 'meaning2word');
  document.getElementById('qmode-m2w').classList.toggle('active', session.mode === 'meaning2word');

  showPage('quiz');
  renderQuestion();
}

function switchMode(mode) {
  session.mode = mode;
  document.getElementById('qmode-w2m').classList.toggle('active', mode === 'word2meaning');
  document.getElementById('qmode-m2w').classList.toggle('active', mode === 'meaning2word');
  if (!session.answered) renderQuestion();
}

function renderQuestion() {
  if (session.idx >= session.words.length) { endSession(); return; }
  session.answered = false;
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('quiz-result').style.display = 'none';

  const widx = session.words[session.idx];
  const word = VOCAB[widx];
  session.currentWord = word;

  document.getElementById('qcur').textContent = session.idx + 1;

  const isW2M = session.mode === 'word2meaning';
  const promptEl = document.getElementById('qprompt');
  const labelEl = document.getElementById('qprompt-label');
  const meaningsEl = document.getElementById('qmeanings-display');

  if (isW2M) {
    promptEl.textContent = word.word;
    promptEl.className = 'quiz-prompt';
    labelEl.textContent = '英文單字';
    meaningsEl.textContent = '';
    document.getElementById('speak-btn').style.display = 'inline-flex';
  } else {
    promptEl.textContent = word.meaning;
    promptEl.className = 'quiz-prompt chinese';
    labelEl.textContent = '中文意思';
    meaningsEl.textContent = '';
    document.getElementById('speak-btn').style.display = 'none';
  }

  // build choices: 1 correct + 3 random wrong
  const choices = buildChoices(widx, isW2M);
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.text;
    btn.onclick = () => handleAnswer(btn, c.correct, word, isW2M);
    choicesEl.appendChild(btn);
  });
}

function buildChoices(correctIdx, isW2M) {
  const correct = VOCAB[correctIdx];
  let wrong = [];
  while (wrong.length < 3) {
    const r = Math.floor(Math.random() * VOCAB.length);
    if (r !== correctIdx && !wrong.includes(r)) wrong.push(r);
  }
  const all = [
    { text: isW2M ? correct.meaning : correct.word, correct: true },
    ...wrong.map(i => ({ text: isW2M ? VOCAB[i].meaning : VOCAB[i].word, correct: false })),
  ];
  return all.sort(() => Math.random() - .5);
}

function handleAnswer(btn, isCorrect, word, isW2M) {
  if (session.answered) return;
  session.answered = true;

  // mark all buttons
  document.querySelectorAll('#choices .choice-btn').forEach(b => {
    b.disabled = true;
    const isThis = b === btn;
    const isCorrectBtn = isW2M
      ? b.textContent === word.meaning
      : b.textContent === word.word;
    if (isCorrectBtn) b.classList.add('correct');
    else if (isThis && !isCorrect) b.classList.add('wrong');
  });

  const resEl = document.getElementById('quiz-result');
  resEl.style.display = 'block';
  if (isCorrect) {
    session.score++;
    document.getElementById('result-emoji').textContent = ['✅','🎉','⭐','🔥','💫'][Math.floor(Math.random()*5)];
    document.getElementById('result-msg').textContent = ['答對了！','太棒了！','完全正確！','厲害！'][Math.floor(Math.random()*4)];
    document.getElementById('result-sub').textContent = isW2M ? word.meaning : word.word;
  } else {
    document.getElementById('result-emoji').textContent = '❌';
    document.getElementById('result-msg').textContent = '答錯了';
    document.getElementById('result-sub').textContent = '正確答案：' + (isW2M ? word.meaning : word.word);
  }

  document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() {
  session.idx++;
  renderQuestion();
}

function endSession() {
  document.getElementById('quiz-active').style.display = 'none';
  const endEl = document.getElementById('session-end');
  endEl.style.display = 'block';
  document.getElementById('end-score').textContent = session.score + '/' + session.words.length;

  // advance cursor
  const today = new Date().toLocaleDateString('zh-TW');
  state.cursor = (state.cursor + session.words.length) % VOCAB.length;
  state.batches.unshift({
    date: today,
    words: session.words,
    label: `第 ${session.words[0]+1}–${session.words[session.words.length-1]+1} 個`,
  });
  if (state.batches.length > 50) state.batches.pop();

  // streak
  if (state.lastDate !== today) {
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    const yStr = yesterday.toLocaleDateString('zh-TW');
    state.streak = (state.lastDate === yStr) ? state.streak + 1 : 1;
    state.lastDate = today;
  }

  saveState();
  updateHomeStats();
}

// ─── REVIEW ────────────────────────────────────────────────────────
let reviewBatch = null;
let reviewMode = 'list';
let fcIdx = 0;
let fcShowing = false;
let revSession = { words: [], idx: 0, score: 0, answered: false };
let popupWord = null;

function renderReviewList() {
  const container = document.getElementById('review-batches');
  const countLabel = document.getElementById('review-count-label');

  if (state.batches.length === 0) {
    container.innerHTML = `<div class="review-empty"><div class="icon">📚</div>還沒有學習記錄，先去學習頁背單字吧！</div>`;
    countLabel.textContent = '0 批';
    return;
  }

  countLabel.textContent = state.batches.length + ' 批';
  container.innerHTML = '';
  state.batches.forEach((b, bi) => {
    const div = document.createElement('div');
    div.className = 'review-batch';
    div.innerHTML = `
      <div class="rb-info">
        <div class="rb-title">📖 ${b.date} · ${b.words.length} 個單字</div>
        <div class="rb-sub">${b.words.slice(0,4).map(i=>VOCAB[i].word).join('、')}${b.words.length>4?'…':''}</div>
      </div>
      <div class="rb-arrow">›</div>`;
    div.onclick = () => openReviewBatch(bi);
    container.appendChild(div);
  });
}

function openReviewBatch(bi) {
  reviewBatch = state.batches[bi];
  fcIdx = 0; fcShowing = false;
  document.getElementById('review-list-view').style.display = 'none';
  document.getElementById('review-words-view').style.display = 'block';
  document.getElementById('rwv-title').textContent = reviewBatch.date + ' 的單字';
  document.getElementById('rwv-sub').textContent = reviewBatch.words.length + ' 個單字';
  setReviewMode('list');
}

function backToReviewList() {
  document.getElementById('review-list-view').style.display = 'block';
  document.getElementById('review-words-view').style.display = 'none';
  document.getElementById('rev-session-end').style.display = 'none';
  renderReviewList();
}

function setReviewMode(mode) {
  reviewMode = mode;
  // update buttons
  ['list','flash','w2m','m2w'].forEach(k => {
    const el = document.getElementById('rvm-' + k);
    if (el) el.classList.remove('active');
  });
  const keyMap = { list:'list', flash:'flash', word2meaning:'w2m', meaning2word:'m2w' };
  const activeKey = keyMap[mode] || mode;
  const activeEl = document.getElementById('rvm-' + activeKey);
  if (activeEl) activeEl.classList.add('active');

  document.getElementById('rev-list-mode').style.display = mode === 'list' ? 'block' : 'none';
  document.getElementById('flash-mode').style.display = mode === 'flash' ? 'block' : 'none';
  document.getElementById('rev-quiz-mode').style.display = (mode === 'word2meaning' || mode === 'meaning2word') ? 'block' : 'none';
  document.getElementById('rev-session-end').style.display = 'none';
  document.getElementById('rev-next-btn').style.display = 'none';
  document.getElementById('rev-quiz-result').style.display = 'none';

  if (mode === 'list') {
    renderWordGrid();
  } else if (mode === 'flash') {
    fcIdx = 0; fcShowing = false;
    renderFlashcard();
  } else {
    revSession = { words: [...reviewBatch.words], idx: 0, score: 0, answered: false };
    renderRevQuestion();
  }
}

function renderWordGrid() {
  const grid = document.getElementById('word-grid');
  grid.innerHTML = '';
  reviewBatch.words.forEach(widx => {
    const w = VOCAB[widx];
    const chip = document.createElement('div');
    chip.className = 'word-chip';
    chip.innerHTML = `<div class="wc-en">${w.word}</div><div class="wc-zh">${w.meaning}</div>`;
    chip.onclick = () => openWordPopup(widx);
    grid.appendChild(chip);
  });
}

function openWordPopup(widx) {
  const w = VOCAB[widx];
  popupWord = w;
  document.getElementById('popup-num').textContent = '#' + w.id;
  document.getElementById('popup-word').textContent = w.word;
  document.getElementById('popup-meaning').textContent = w.meaning;
  const popup = document.getElementById('word-popup');
  popup.style.display = 'flex';
}

function closeWordPopup() {
  document.getElementById('word-popup').style.display = 'none';
  popupWord = null;
}

function speakPopupWord() {
  if (popupWord) speak(popupWord.word);
}

function renderFlashcard() {
  if (!reviewBatch) return;
  const widx = reviewBatch.words[fcIdx];
  const word = VOCAB[widx];
  fcShowing = false;
  document.getElementById('fc-word').textContent = word.word;
  document.getElementById('fc-meanings').textContent = word.meaning;
  document.getElementById('fc-meanings').style.display = 'none';
  document.getElementById('fc-hint').textContent = '點擊顯示意思';
  document.getElementById('fc-count').textContent = (fcIdx+1) + ' / ' + reviewBatch.words.length;
}

function toggleFlashcard() {
  fcShowing = !fcShowing;
  document.getElementById('fc-meanings').style.display = fcShowing ? 'block' : 'none';
  document.getElementById('fc-hint').textContent = fcShowing ? '再次點擊隱藏' : '點擊顯示意思';
}

function fcPrev() {
  if (fcIdx > 0) { fcIdx--; renderFlashcard(); }
  else showToast('已是第一個！');
}

function fcNext() {
  if (fcIdx < reviewBatch.words.length - 1) { fcIdx++; renderFlashcard(); }
  else showToast('已是最後一個！');
}

function speakFlashcard() {
  if (!reviewBatch) return;
  const word = VOCAB[reviewBatch.words[fcIdx]];
  speak(word.word);
}

function renderRevQuestion() {
  if (revSession.idx >= revSession.words.length) {
    document.getElementById('rev-quiz-result').style.display = 'none';
    document.getElementById('rev-next-btn').style.display = 'none';
    document.getElementById('rev-session-end').style.display = 'block';
    document.getElementById('rev-end-score').textContent = revSession.score + '/' + revSession.words.length;
    return;
  }
  revSession.answered = false;
  document.getElementById('rev-next-btn').style.display = 'none';
  document.getElementById('rev-quiz-result').style.display = 'none';
  document.getElementById('rev-session-end').style.display = 'none';

  const widx = revSession.words[revSession.idx];
  const word = VOCAB[widx];
  const isW2M = reviewMode === 'word2meaning';

  const promptEl = document.getElementById('rqprompt');
  const labelEl = document.getElementById('rqprompt-label');
  if (isW2M) {
    promptEl.textContent = word.word;
    promptEl.className = 'quiz-prompt';
    labelEl.textContent = '英文單字';
    document.getElementById('rspeak-btn').style.display = 'inline-flex';
  } else {
    promptEl.textContent = word.meaning;
    promptEl.className = 'quiz-prompt chinese';
    labelEl.textContent = '中文意思';
    document.getElementById('rspeak-btn').style.display = 'none';
  }
  document.getElementById('rqmeanings-display').textContent = '';

  const choices = buildChoices(widx, isW2M);
  const el = document.getElementById('rev-choices');
  el.innerHTML = '';
  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.text;
    btn.onclick = () => handleRevAnswer(btn, c.correct, word, isW2M);
    el.appendChild(btn);
  });
}

function handleRevAnswer(btn, isCorrect, word, isW2M) {
  if (revSession.answered) return;
  revSession.answered = true;

  document.querySelectorAll('#rev-choices .choice-btn').forEach(b => {
    b.disabled = true;
    const isCorrectBtn = isW2M ? b.textContent === word.meaning : b.textContent === word.word;
    if (isCorrectBtn) b.classList.add('correct');
    else if (b === btn && !isCorrect) b.classList.add('wrong');
  });

  const resEl = document.getElementById('rev-quiz-result');
  resEl.style.display = 'block';
  if (isCorrect) {
    revSession.score++;
    document.getElementById('rev-result-emoji').textContent = '✅';
    document.getElementById('rev-result-msg').textContent = '答對了！';
  } else {
    document.getElementById('rev-result-emoji').textContent = '❌';
    document.getElementById('rev-result-msg').textContent = '正確：' + (isW2M ? word.meaning : word.word);
  }
  document.getElementById('rev-next-btn').style.display = 'block';
}

function revNextQuestion() {
  revSession.idx++;
  renderRevQuestion();
}

function speakReviewWord() {
  const widx = revSession.words[revSession.idx];
  speak(VOCAB[widx].word);
}

// ─── SPEECH ────────────────────────────────────────────────────────
function speak(text) {
  if (!window.speechSynthesis) { showToast('瀏覽器不支援語音'); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.85;
  window.speechSynthesis.speak(u);
}

function speakWord() {
  if (session.currentWord) speak(session.currentWord.word);
}

// ─── UI HELPERS ────────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => {
    if (b.textContent.includes(name === 'home' ? '首頁' : name === 'quiz' ? '學習' : '複習'))
      b.classList.add('active');
  });
  if (name === 'review') renderReviewList();
  if (name === 'home') updateHomeStats();
}

function updateHomeStats() {
  const learned = state.cursor;
  document.getElementById('stat-learned').textContent = learned;
  document.getElementById('stat-streak').textContent = state.streak;
  const pct = Math.round(learned / 1200 * 100);
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-text').textContent = learned + ' / 1200';
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-remain').textContent = '剩餘 ' + (1200 - learned) + ' 字';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── GOAL CONTROL ──────────────────────────────────────────────────
const goalInput = document.getElementById('goal-input');
const goalSlider = document.getElementById('goal-slider');

function syncGoal(val) {
  val = Math.max(1, Math.min(1000, parseInt(val) || 1));
  state.goal = val;
  goalInput.value = val;
  goalSlider.value = val;
  goalSlider.style.setProperty('--pct', (val / 10) + '%');
  saveState();
}

goalInput.addEventListener('input', () => syncGoal(goalInput.value));
goalSlider.addEventListener('input', () => syncGoal(goalSlider.value));
syncGoal(state.goal);
updateHomeStats();
</script>
